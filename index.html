: 66.3, "rating": "greed"}, {"date": "2026-04-28", "spy": 711.69, "qqq": 657.55, "fearGreed": 67.4, "rating": "greed"}, {"date": "2026-04-29", "spy": 711.58, "qqq": 661.57, "fearGreed": 66.2, "rating": "greed"}, {"date": "2026-04-30", "spy": 718.66, "qqq": 667.74, "fearGreed": 69.5, "rating": "greed"}, {"date": "2026-05-01", "spy": 720.65, "qqq": 674.15, "fearGreed": 71.2, "rating": "greed"}, {"date": "2026-05-04", "spy": 718.01, "qqq": 672.88, "fearGreed": 66.9, "rating": "greed"}, {"date": "2026-05-05", "spy": 723.77, "qqq": 681.61, "fearGreed": 67.3, "rating": "greed"}, {"date": "2026-05-06", "spy": 733.83, "qqq": 695.77, "fearGreed": 68.7, "rating": "greed"}, {"date": "2026-05-07", "spy": 731.58, "qqq": 694.94, "fearGreed": 66.4, "rating": "greed"}, {"date": "2026-05-08", "spy": 737.62, "qqq": 711.23, "fearGreed": 66.7, "rating": "greed"}, {"date": "2026-05-11", "spy": 739.3, "qqq": 713.29, "fearGreed": 65.4, "rating": "greed"}, {"date": "2026-05-12", "spy": 738.18, "qqq": 707.24, "fearGreed": 65.1, "rating": "greed"}, {"date": "2026-05-13", "spy": 742.31, "qqq": 714.71, "fearGreed": 64.0, "rating": "greed"}, {"date": "2026-05-14", "spy": 748.17, "qqq": 719.79, "fearGreed": 65.0, "rating": "greed"}, {"date": "2026-05-15", "spy": 739.17, "qqq": 708.93, "fearGreed": 62.9, "rating": "greed"}]};
      const allPoints = payload.points.map((d) => ({ ...d, t: new Date(d.date).getTime() }));
      const canvas = document.querySelector("#chart");
      const tooltip = document.querySelector("#tooltip");
      const period = document.querySelector("#period");
      const foot = document.querySelector("#foot");
      const ctx = canvas.getContext("2d");
      let range = "all";
      let hoverIndex = -1;
      let visibleStart = allPoints[0].t;
      let visibleEnd = allPoints.at(-1).t;
      let dragState = null;

      period.textContent = payload.meta.period;
      foot.textContent = `${payload.meta.source}。${payload.meta.note}`;

      const fmt = new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 });
      const fmtFg = new Intl.NumberFormat("en-US", { maximumFractionDigits: 1 });

      function clampWindow(start, end) {
        const fullStart = allPoints[0].t;
        const fullEnd = allPoints.at(-1).t;
        const span = end - start;
        if (span >= fullEnd - fullStart) return [fullStart, fullEnd];
        if (start < fullStart) return [fullStart, fullStart + span];
        if (end > fullEnd) return [fullEnd - span, fullEnd];
        return [start, end];
      }

      function setRangeWindow(nextRange) {
        range = nextRange;
        const last = allPoints.at(-1).t;
        if (range === "all") {
          [visibleStart, visibleEnd] = [allPoints[0].t, last];
          return;
        }
        const years = range === "5y" ? 5 : range === "3y" ? 3 : 1;
        const cutoff = new Date(last);
        cutoff.setFullYear(cutoff.getFullYear() - years);
        [visibleStart, visibleEnd] = clampWindow(cutoff.getTime(), last);
      }

      function panWindow(deltaPixels) {
        const plot = canvas._plot;
        if (!plot) return;
        const span = visibleEnd - visibleStart;
        const plotWidth = Math.max(1, plot.x1 - plot.x0);
        const deltaTime = -(deltaPixels / plotWidth) * span;
        [visibleStart, visibleEnd] = clampWindow(visibleStart + deltaTime, visibleEnd + deltaTime);
      }

      function pointsForRange() {
        return allPoints.filter((p) => p.t >= visibleStart && p.t <= visibleEnd);
      }

      function resize() {
        const box = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(box.width * dpr);
        canvas.height = Math.round(box.height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        draw();
      }

      function niceTicks(min, max, count = 6) {
        const span = max - min || 1;
        const step = span / count;
        return Array.from({ length: count + 1 }, (_, i) => min + step * i);
      }

      function map(value, min, max, start, end) {
        return start + ((value - min) / (max - min || 1)) * (end - start);
      }

      function path(points, getY, color, width = 2.4) {
        ctx.beginPath();
        points.forEach((p, i) => {
          const x = p.x;
          const y = getY(p);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.strokeStyle = color;
        ctx.lineWidth = width;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        ctx.stroke();
      }

      function draw() {
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        ctx.clearRect(0, 0, width, height);
        const points = pointsForRange();
        if (!points.length) return;
        const pad = { left: 64, right: 62, top: 30, bottom: 52 };
        const plot = { x0: pad.left, x1: width - pad.right, y0: pad.top, y1: height - pad.bottom };
        canvas._plot = plot;
        const minT = points[0].t;
        const maxT = points.at(-1).t;
        const indexValues = points.flatMap((p) => [p.spy, p.qqq]);
        const minIndex = Math.min(...indexValues) * 0.96;
        const maxIndex = Math.max(...indexValues) * 1.04;

        const enriched = points.map((p) => ({
          ...p,
          x: map(p.t, minT, maxT, plot.x0, plot.x1),
          ySpy: map(p.spy, minIndex, maxIndex, plot.y1, plot.y0),
          yQqq: map(p.qqq, minIndex, maxIndex, plot.y1, plot.y0),
          yFg: map(p.fearGreed, 0, 100, plot.y1, plot.y0),
        }));

        ctx.fillStyle = "rgba(255, 59, 79, 0.08)";
        ctx.fillRect(plot.x0, map(30, 0, 100, plot.y1, plot.y0), plot.x1 - plot.x0, plot.y1 - map(30, 0, 100, plot.y1, plot.y0));
        ctx.strokeStyle = "rgba(255, 59, 79, 0.26)";
        ctx.setLineDash([6, 6]);
        ctx.beginPath();
        ctx.moveTo(plot.x0, map(30, 0, 100, plot.y1, plot.y0));
        ctx.lineTo(plot.x1, map(30, 0, 100, plot.y1, plot.y0));
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.strokeStyle = "#e4ebe7";
        ctx.lineWidth = 1;
        ctx.fillStyle = "#66727d";
        ctx.font = "12px Inter, sans-serif";
        ctx.textBaseline = "middle";
        niceTicks(minIndex, maxIndex, 6).forEach((tick) => {
          const y = map(tick, minIndex, maxIndex, plot.y1, plot.y0);
          ctx.beginPath();
          ctx.moveTo(plot.x0, y);
          ctx.lineTo(plot.x1, y);
          ctx.stroke();
          ctx.textAlign = "right";
          ctx.fillText(fmt.format(tick), plot.x0 - 10, y);
        });
        [0, 20, 40, 60, 80, 100].forEach((tick) => {
          const y = map(tick, 0, 100, plot.y1, plot.y0);
          ctx.textAlign = "left";
          ctx.fillText(String(tick), plot.x1 + 10, y);
        });

        const dateTicks = 6;
        ctx.textBaseline = "top";
        for (let i = 0; i <= dateTicks; i += 1) {
          const idx = Math.round((enriched.length - 1) * (i / dateTicks));
          const p = enriched[idx];
          const label = new Date(p.date).toLocaleDateString("zh-CN", { year: "2-digit", month: "2-digit" });
          ctx.textAlign = i === 0 ? "left" : i === dateTicks ? "right" : "center";
          ctx.fillText(label, p.x, plot.y1 + 16);
        }

        path(enriched, (p) => p.ySpy, "#2563eb", 2.4);
        path(enriched, (p) => p.yQqq, "#7c3aed", 2.4);
        path(enriched, (p) => p.yFg, "#00b956", 1.9);

        ctx.fillStyle = "#66727d";
        ctx.textAlign = "left";
        ctx.textBaseline = "top";
        ctx.fillText("SPY / QQQ", plot.x0, 8);
        ctx.textAlign = "right";
        ctx.fillText("Fear & Greed", plot.x1, 8);

        if (hoverIndex >= 0) {
          const p = enriched[hoverIndex];
          if (p) {
            ctx.strokeStyle = "rgba(13, 24, 32, 0.22)";
            ctx.beginPath();
            ctx.moveTo(p.x, plot.y0);
            ctx.lineTo(p.x, plot.y1);
            ctx.stroke();
            [["#2563eb", p.ySpy], ["#7c3aed", p.yQqq], ["#00b956", p.yFg]].forEach(([color, y]) => {
              ctx.fillStyle = "#fff";
              ctx.strokeStyle = color;
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(p.x, y, 4, 0, Math.PI * 2);
              ctx.fill();
              ctx.stroke();
            });
          }
        }
        canvas._points = enriched;
      }

      function updateTooltip(event) {
        const points = canvas._points || [];
        if (!points.length) return;
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        let best = 0;
        let bestDist = Infinity;
        points.forEach((p, i) => {
          const dist = Math.abs(p.x - x);
          if (dist < bestDist) { best = i; bestDist = dist; }
        });
        hoverIndex = best;
        const p = points[best];
        tooltip.style.display = "block";
        tooltip.style.left = `${Math.min(rect.width - 250, Math.max(12, p.x + 14))}px`;
        tooltip.style.top = `${Math.max(12, Math.min(rect.height - 150, event.clientY - rect.top - 70))}px`;
        tooltip.innerHTML = `
          <strong>${p.date} · ${p.rating}</strong>
          <div><span>SPY</span><b>${fmt.format(p.spy)}</b></div>
          <div><span>QQQ</span><b>${fmt.format(p.qqq)}</b></div>
          <div><span>Fear & Greed</span><b>${fmtFg.format(p.fearGreed)}</b></div>
        `;
        draw();
      }

      function handlePointerDown(event) {
        const plot = canvas._plot;
        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        if (!plot || x < plot.x0 || x > plot.x1) return;
        dragState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          lastX: event.clientX,
          moved: false,
        };
        canvas.classList.add("is-dragging");
        canvas.setPointerCapture(event.pointerId);
      }

      function handlePointerMove(event) {
        if (!dragState || dragState.pointerId !== event.pointerId) {
          updateTooltip(event);
          return;
        }
        const delta = event.clientX - dragState.lastX;
        if (Math.abs(event.clientX - dragState.startX) > 3) dragState.moved = true;
        dragState.lastX = event.clientX;
        panWindow(delta);
        hoverIndex = -1;
        tooltip.style.display = "none";
        draw();
      }

      function endPointerDrag(event) {
        if (!dragState || dragState.pointerId !== event.pointerId) return;
        canvas.releasePointerCapture(event.pointerId);
        canvas.classList.remove("is-dragging");
        dragState = null;
      }

      function handleWheel(event) {
        const horizontalDelta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : 0;
        if (!horizontalDelta) return;
        event.preventDefault();
        panWindow(-horizontalDelta);
        hoverIndex = -1;
        tooltip.style.display = "none";
        draw();
      }

      canvas.addEventListener("mousemove", updateTooltip);
      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);
      canvas.addEventListener("pointerup", endPointerDrag);
      canvas.addEventListener("pointercancel", endPointerDrag);
      canvas.addEventListener("wheel", handleWheel, { passive: false });
      canvas.addEventListener("mouseleave", () => {
        if (dragState) return;
        hoverIndex = -1;
        tooltip.style.display = "none";
        draw();
      });
      document.querySelectorAll("[data-range]").forEach((button) => {
        button.addEventListener("click", () => {
          setRangeWindow(button.dataset.range);
          document.querySelectorAll("[data-range]").forEach((item) => item.classList.toggle("is-active", item === button));
          hoverIndex = -1;
          tooltip.style.display = "none";
          draw();
        });
      });
      window.addEventListener("resize", resize);
      setRangeWindow("all");
      resize();
    </script>
